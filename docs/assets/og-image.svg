<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="og-title">
  <title id="og-title">フォーム仕分け自動化パック</title>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>

  <!-- アイコン（favicon を拡大） -->
  <g transform="translate(100 220)">
    <rect width="180" height="180" rx="32" fill="#2563eb"/>
    <rect x="34" y="52" width="112" height="14" rx="5" fill="#ffffff"/>
    <rect x="34" y="86" width="76" height="14" rx="5" fill="#ffffff" opacity="0.85"/>
    <rect x="34" y="120" width="96" height="14" rx="5" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- タイトル -->
  <text x="340" y="260" font-family="'Noto Sans JP', sans-serif" font-weight="900" font-size="60" fill="#0f172a" letter-spacing="-1">
    フォーム仕分け自動化パック
  </text>

  <!-- サブコピー -->
  <text x="340" y="330" font-family="'Noto Sans JP', sans-serif" font-weight="500" font-size="28" fill="#334155">
    Googleフォームの回答を、カテゴリ別シートに自動で振り分け。
  </text>

  <!-- 特徴バッジ -->
  <g font-family="'Noto Sans JP', sans-serif" font-weight="700" font-size="22">
    <rect x="340" y="380" width="170" height="44" rx="22" fill="#dbeafe"/>
    <text x="425" y="410" text-anchor="middle" fill="#1d4ed8">7日納品</text>

    <rect x="530" y="380" width="200" height="44" rx="22" fill="#dbeafe"/>
    <text x="630" y="410" text-anchor="middle" fill="#1d4ed8">月額費用なし</text>

    <rect x="750" y="380" width="220" height="44" rx="22" fill="#dbeafe"/>
    <text x="860" y="410" text-anchor="middle" fill="#1d4ed8">全額返金保証</text>
  </g>

  <!-- 価格 -->
  <text x="340" y="490" font-family="'Noto Sans JP', sans-serif" font-weight="900" font-size="44" fill="#0f172a">
    14,800円〜
  </text>
  <text x="540" y="490" font-family="'Noto Sans JP', sans-serif" font-weight="500" font-size="24" fill="#64748b">
    買い切り・税込
  </text>
</svg>
